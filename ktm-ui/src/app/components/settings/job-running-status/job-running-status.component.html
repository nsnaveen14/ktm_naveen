
<div *ngIf="jobRunningStatusList.data && jobRunningStatusList.data.length > 0" class="mat-elevation-z8">

    <table mat-table [dataSource]="jobRunningStatusList" class="mat-elevation-z8" style="width: 100%">
        
    <ng-container matColumnDef="appJobConfigNum">
            <th mat-header-cell *matHeaderCellDef> Config Num </th>
            <td mat-cell *matCellDef="let element"> {{element.appJobConfigNum}} </td>
    </ng-container>

    <ng-container matColumnDef="jobName">
        <th mat-header-cell *matHeaderCellDef> Job Name </th>
        <td mat-cell *matCellDef="let element"> {{element.jobName}} </td>
    </ng-container>
  
    <ng-container matColumnDef="jobForExpiryDate">
        <th mat-header-cell *matHeaderCellDef> Expiry Date </th>
        <td mat-cell *matCellDef="let element"> {{element.jobForExpiryDate | date:'shortDate'}} </td>
    </ng-container>

    <ng-container matColumnDef="jobStartTime">
        <th mat-header-cell *matHeaderCellDef> Job Start Time </th>
        <td mat-cell *matCellDef="let element"> {{element.jobStartTime | date:'short'}} </td>
    </ng-container>
  
    <ng-container matColumnDef="jobEndTime">
        <th mat-header-cell *matHeaderCellDef> Job End Time </th>
        <td mat-cell *matCellDef="let element"> {{element.jobEndTime | date:'short'}} </td>
    </ng-container>
  
    <ng-container matColumnDef="jobStatus">
        <th mat-header-cell *matHeaderCellDef> Job Status </th>
        <td mat-cell *matCellDef="let element"> {{element.jobStatus}} </td>
    </ng-container>
   
    
        
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  
  </div>
  <mat-paginator [pageSizeOptions]="[5, 7]" showFirstLastButtons aria-label="Job Running Status"></mat-paginator>
<div *ngIf="!jobRunningStatusList.data || jobRunningStatusList.data.length === 0">
  <p>No job status available.</p>
</div>
